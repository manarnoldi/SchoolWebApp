# Pings the live site on a schedule so the IIS worker (site4now) doesn't idle
# out and cold-start for the next real user. Cheap GET to "/" keeps the app
# pool warm. Also runnable manually.
#
# Note: GitHub may disable scheduled workflows after ~60 days of repo
# inactivity, and cron times can be delayed under load - both fine for a
# keep-alive. Adjust the URL if the public hostname changes.

name: Keep Swikunda warm

on:
  schedule:
    # every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the site
        run: |
          URL="https://swikunda.kodetek.co.ke/"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
          echo "GET $URL -> HTTP $code"
          # Don't fail the workflow on a transient blip; this is best-effort.
          if [ "$code" != "200" ]; then
            echo "::warning::Keep-alive ping returned HTTP $code"
          fi
