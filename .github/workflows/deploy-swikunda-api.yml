# Build the .NET API and FTP-deploy it to the Windows host (site4now / myWindowsHosting).
#
# Required GitHub secrets (Repo → Settings → Secrets and variables → Actions):
#   FTP_SERVER       e.g. win8082.site4now.net
#   FTP_USERNAME     e.g. smwadwaa-002
#   FTP_PASSWORD     the FTP password
#   FTP_REMOTE_DIR_SWIKUNDA_API   the remote folder for the swikunda API site, e.g. /swikunda-api/
#
# Trigger: manual only — run from the Actions tab via the "Run workflow" button.

name: Deploy Swikunda API to site4now (FTP)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SchoolWebApp-API/SchoolWebApp.API.Project.sln

      - name: Publish
        run: >
          dotnet publish SchoolWebApp-API/Project.API/SchoolWebApp.API.csproj
          --configuration Release
          --output ./publish
          --no-restore
          /p:UseAppHost=false

      # Take the app offline by uploading app_offline.htm. ASP.NET Core sees this
      # file and gracefully shuts down the worker, releasing file locks so the
      # FTP step below can overwrite the DLLs without 550 errors.
      - name: Take app offline
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR_SWIKUNDA_API }}
        run: |
          curl --silent --show-error --fail \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            -T .github/deploy/app_offline.htm \
            "ftp://$FTP_SERVER$FTP_REMOTE_DIR"

      # Give IIS a few seconds to notice app_offline.htm and release file locks.
      - name: Wait for IIS to release locks
        run: sleep 10

      # FTP upload — only diffs are pushed on subsequent runs (state file kept on the host).
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_REMOTE_DIR_SWIKUNDA_API }}
          local-dir: ./publish/
          # Don't delete files we didn't upload (logs, App_Data, etc.).
          dangerous-clean-slate: false
          # Keep these on the server even if local doesn't have them.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/appsettings.Development.json
            **/appsettings.Production.json

      # Bring the app back online by deleting app_offline.htm. `if: always()`
      # runs this even when an earlier step failed, otherwise a botched deploy
      # would leave the site stuck on the offline page until manually fixed.
      # The `|| true` swallows errors so a network blip here doesn't fail the
      # whole workflow — re-running the deploy will overwrite + retry the delete.
      - name: Bring app back online
        if: always()
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR_SWIKUNDA_API }}
        run: |
          curl --silent --show-error \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            --output /dev/null \
            -Q "DELE app_offline.htm" \
            "ftp://$FTP_SERVER$FTP_REMOTE_DIR" \
            || echo "app_offline.htm delete failed (may not exist) — site will still come back up after IIS recycle."
