# Build the .NET API + Angular client and FTP-deploy them as ONE site to the
# Windows host (site4now). The Angular build is embedded in the API's wwwroot,
# so the API serves both the app and the /api endpoints from a single origin.
#
# Required GitHub secrets (Repo → Settings → Secrets and variables → Actions):
#   FTP_SERVER                    e.g. win8082.site4now.net
#   FTP_USERNAME                  e.g. smwadwaa-002
#   FTP_PASSWORD                  the FTP password
#   FTP_REMOTE_DIR_SWIKUNDA_UI    the remote folder for the swikunda site, e.g. /swikunda-ui/
#
# Note: the swikunda site must be configured for ASP.NET Core, and an
# appsettings.Production.json (connection string + JWT key) must already exist
# in the remote folder — this workflow never deploys that secret file.
#
# Trigger: manual only — run from the Actions tab via the "Run workflow" button.

name: Deploy Swikunda (API + UI) to site4now (FTP)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SchoolWebApp-Client/package-lock.json

      - name: Restore (API)
        run: dotnet restore SchoolWebApp-API/SchoolWebApp.API.Project.sln

      - name: Publish (API)
        run: >
          dotnet publish SchoolWebApp-API/Project.API/SchoolWebApp.API.csproj
          --configuration Release
          --output ./publish
          --no-restore
          /p:UseAppHost=false

      # HUSKY=0 skips the husky `prepare` hook, which fails in CI because .git
      # lives at the repo root, not next to package.json.
      - name: Install (client)
        working-directory: SchoolWebApp-Client
        env:
          HUSKY: 0
        run: npm ci --no-audit --no-fund

      - name: Build (client, production)
        working-directory: SchoolWebApp-Client
        run: npm run build

      # Embed the built Angular app in the API's wwwroot so the API serves it.
      - name: Embed client in API wwwroot
        run: |
          mkdir -p ./publish/wwwroot
          cp -r SchoolWebApp-Client/dist/shulenova/* ./publish/wwwroot/

      # Take the app offline by uploading app_offline.htm. ASP.NET Core sees this
      # file and gracefully shuts down the worker, releasing file locks so the
      # FTP step below can overwrite the DLLs without 550 errors.
      - name: Take app offline
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR_SWIKUNDA_UI }}
        run: |
          curl --silent --show-error --fail \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            -T .github/deploy/app_offline.htm \
            "ftp://$FTP_SERVER$FTP_REMOTE_DIR"

      - name: Wait for IIS to release locks
        run: sleep 10

      # FTP upload — only diffs are pushed on subsequent runs (state file kept on the host).
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_REMOTE_DIR_SWIKUNDA_UI }}
          local-dir: ./publish/
          # Don't delete files we didn't upload (logs, App_Data, etc.).
          dangerous-clean-slate: false
          # Keep these on the server even if local doesn't have them.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/appsettings.Development.json
            **/appsettings.Production.json

      # Bring the app back online by deleting app_offline.htm. `if: always()`
      # runs this even when an earlier step failed, otherwise a botched deploy
      # would leave the site stuck on the offline page until manually fixed.
      - name: Bring app back online
        if: always()
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR_SWIKUNDA_UI }}
        run: |
          set +e  # don't exit on transient curl failures inside the loop

          # curl's -Q (quote) commands run from the FTP user's home directory,
          # NOT from the URL path. So we must pass an absolute path in the DELE
          # command itself; the URL is just the connection target.
          REMOTE_FILE="${FTP_REMOTE_DIR%/}/app_offline.htm"

          for attempt in 1 2 3 4 5; do
            echo "Attempt ${attempt}: deleting $REMOTE_FILE"
            curl --show-error \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --output /dev/null \
              -Q "DELE $REMOTE_FILE" \
              "ftp://$FTP_SERVER/" 2>&1 | sed 's/^/  /'

            sleep 3

            if ! curl --silent --fail --head \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              "ftp://$FTP_SERVER${FTP_REMOTE_DIR}app_offline.htm" \
              > /dev/null 2>&1; then
              echo "Confirmed: app_offline.htm is gone (attempt ${attempt})"
              exit 0
            fi

            echo "  file still present, retrying in 5s..."
            sleep 5
          done

          echo "::error::Failed to remove app_offline.htm after 5 attempts. Site is stuck on the offline page — log into FileZilla and delete app_offline.htm manually."
          exit 1
