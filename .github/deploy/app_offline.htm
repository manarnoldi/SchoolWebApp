<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="15">
    <title>Updating — back soon</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 1rem;
        }
        .card {
            max-width: 28rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            padding: 2.5rem;
            text-align: center;
        }
        h1 { margin: 0 0 1rem; font-size: 1.75rem; }
        p { margin: 0.5rem 0; opacity: 0.9; line-height: 1.5; }
        .hint { margin-top: 1.5rem; font-size: 0.875rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Be right back</h1>
        <p>We're rolling out an update.</p>
        <p>This usually takes a minute or two.</p>
        <p class="hint">This page refreshes automatically every 15 seconds.</p>
    </div>
</body>
</html>
