<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 p-1">
    <!-- Windowed pager: show a small range around the current page with
         ellipses + first/last/prev-next links so it never spans the page,
         no matter how many pages there are. -->
    <ngb-pagination
        [collectionSize]="collectionSize"
        [(page)]="page"
        [pageSize]="pageSize"
        [maxSize]="5"
        [rotate]="true"
        [ellipses]="true"
        [boundaryLinks]="true"
        size="sm"
        (pageChange)="pageChanged()">
    </ngb-pagination>

    <select
        class="custom-select"
        style="width: auto"
        [(ngModel)]="pageSize"
        (ngModelChange)="changePageSize()">
        <option [ngValue]="5">5 items per page</option>
        <option [ngValue]="10">10 items per page</option>
        <option [ngValue]="20">20 items per page</option>
        <option [ngValue]="30">30 items per page</option>
        <option [ngValue]="50">50 items per page</option>
        <option [ngValue]="100">100 items per page</option>
    </select>
</div>
