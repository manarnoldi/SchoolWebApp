<app-dashboard-header [title]="dashboardTitle" [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">

<div class="card card-outline card-primary mb-2">
    <div class="card-header p-2 d-flex justify-content-between align-items-center">
        <strong><i class="fas fa-users"></i> Users</strong>
        <button class="btn btn-sm btn-primary" (click)="toggleForm()">
            <i class="fas" [ngClass]="showForm ? 'fa-times' : 'fa-plus'"></i>
            {{ showForm ? 'Cancel' : 'Add User' }}
        </button>
    </div>

    <div class="card-body p-2" *ngIf="showForm">
        <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
            <div class="row">
                <div class="col-md-3">
                    <div class="form-group mb-1">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm" formControlName="userName">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group mb-1">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control form-control-sm" formControlName="email">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group mb-1">
                        <label class="form-label">First Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm" formControlName="firstName">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group mb-1">
                        <label class="form-label">Last Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm" formControlName="lastName">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3">
                    <div class="form-group mb-1">
                        <label class="form-label">Password {{ editMode ? '(leave blank to keep)' : '' }} <span *ngIf="!editMode" class="text-danger">*</span></label>
                        <input type="password" class="form-control form-control-sm" formControlName="password">
                    </div>
                </div>
                <div class="col-md-3 d-flex align-items-end mb-1">
                    <button type="submit" class="btn btn-sm btn-success" [disabled]="userForm.invalid">
                        <i class="fas fa-save"></i> {{ editMode ? 'Update' : 'Create' }}
                    </button>
                    <button type="button" class="btn btn-sm btn-secondary ms-1" (click)="resetForm()">
                        <i class="fas fa-redo"></i> Reset
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div class="card-body p-0">
        <div class="text-center p-3" *ngIf="isLoading">
            <i class="fas fa-spinner fa-spin"></i> Loading...
        </div>
        <table class="table table-striped table-hover table-sm mb-0" *ngIf="!isLoading">
            <thead class="bg-light">
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Name</th>
                    <th>Roles</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of users; index as i">
                    <td>{{ i + 1 }}</td>
                    <td>{{ user.userName }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.firstName }} {{ user.lastName }}</td>
                    <td>
                        <span class="badge bg-info me-1" *ngFor="let r of user.roles">{{ r }}</span>
                        <span *ngIf="!user.roles?.length" class="text-muted">No roles</span>
                    </td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-warning" (click)="editUser(user)" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-info" (click)="resetPassword(user)" title="Reset Password">
                                <i class="fas fa-key"></i>
                            </button>
                            <button class="btn btn-danger" (click)="deleteUser(user)" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="users.length === 0">
                    <td colspan="6" class="text-center text-muted">No users found</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
