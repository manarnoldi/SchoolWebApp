<app-dashboard-header [title]="dashboardTitle" [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">

<div class="row">
    <div class="col-md-6">
        <div class="card card-outline card-primary mb-2">
            <div class="card-header p-2">
                <strong><i class="fas fa-users"></i> Select User</strong>
            </div>
            <div class="card-body p-0">
                <div class="text-center p-3" *ngIf="isLoading">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                </div>
                <table class="table table-striped table-hover table-sm mb-0" *ngIf="!isLoading">
                    <thead class="bg-light">
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Name</th>
                            <th>Current Roles</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let user of users; index as i"
                            [class.table-primary]="selectedUser?.id === user.id"
                            (click)="selectUser(user)" style="cursor: pointer;">
                            <td>{{ i + 1 }}</td>
                            <td>{{ user.userName }}</td>
                            <td>{{ user.firstName }} {{ user.lastName }}</td>
                            <td>
                                <span class="badge bg-info me-1" *ngFor="let r of user.roles">{{ r }}</span>
                                <span *ngIf="!user.roles?.length" class="text-muted">-</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card card-outline card-success mb-2">
            <div class="card-header p-2">
                <strong><i class="fas fa-user-shield"></i>
                    {{ selectedUser ? 'Roles for: ' + selectedUser.userName : 'Select a user' }}
                </strong>
            </div>
            <div class="card-body p-2" *ngIf="selectedUser">
                <div class="list-group">
                    <label class="list-group-item d-flex align-items-center"
                           *ngFor="let role of roles" style="cursor: pointer;">
                        <div class="icheck-success me-2">
                            <input type="checkbox"
                                [id]="'role_' + role.id"
                                [checked]="hasRole(role.name)"
                                (change)="toggleRole(role)"
                                [disabled]="isSaving" />
                            <label [for]="'role_' + role.id"></label>
                        </div>
                        <span class="ms-2">{{ role.name }}</span>
                    </label>
                </div>
            </div>
            <div class="card-body p-3 text-center text-muted" *ngIf="!selectedUser">
                Click on a user to manage their roles
            </div>
        </div>
    </div>
</div>
