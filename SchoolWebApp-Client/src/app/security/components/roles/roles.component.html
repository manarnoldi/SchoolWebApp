<app-dashboard-header [title]="dashboardTitle" [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<section class="content">
    <div class="container-fluid px-1">

        <!-- Add/Edit Modal -->
        <div class="modal-backdrop fade show" *ngIf="showForm" (click)="cancel()"></div>
        <div class="modal fade show d-block" *ngIf="showForm" tabindex="-1">
            <div class="modal-dialog modal-md" style="margin-top: 50px;">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white py-2">
                        <h5 class="modal-title"><i class="fas fa-user-shield me-1"></i> {{ editMode ? 'Edit' : 'New' }} Role</h5>
                        <button type="button" class="close text-white" (click)="cancel()"><span>&times;</span></button>
                    </div>
                    <div class="modal-body p-2">
                        <form [formGroup]="roleForm">
                            <div class="border border-success rounded p-2 mb-2">
                                <h6 class="text-success mb-2"><i class="fas fa-info-circle me-1"></i> Role Details</h6>
                                <div class="row g-2">
                                    <div class="col-md-12">
                                        <label class="form-label mb-0" style="font-size:0.8rem;">Role Name <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control form-control-sm" formControlName="name" placeholder="e.g. Administrator" />
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer py-1">
                        <button type="button" class="btn btn-sm btn-secondary" (click)="cancel()">Cancel</button>
                        <button type="button" class="btn btn-sm btn-success" (click)="onSubmit()" [disabled]="roleForm.invalid">
                            <i class="fas fa-save"></i> {{ editMode ? 'Update' : 'Save' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters + Buttons row -->
        <div class="row g-1 mb-1 align-items-end">
            <div class="col-md-4">
                <label class="form-label mb-0" style="font-size:0.8rem;">Search</label>
                <input type="text" class="form-control form-control-sm" [(ngModel)]="searchTerm" placeholder="Search by role name" />
            </div>
            <div class="col-auto">
                <button class="btn btn-sm btn-outline-secondary" (click)="searchTerm = ''" title="Clear"><i class="fas fa-times"></i></button>
            </div>
            <div class="col text-end">
                <button class="btn btn-sm btn-success" (click)="addNew()"><i class="fas fa-plus"></i> Add Role</button>
            </div>
        </div>

        <!-- List -->
        <div class="card card-outline card-success">
            <div class="card-header py-1 d-flex justify-content-between align-items-center bg-info text-white">
                <div>
                    <strong><i class="fas fa-user-shield me-1"></i> Roles</strong>
                    <span class="badge bg-light text-dark ms-2">{{ filtered().length }}</span>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="text-center p-3" *ngIf="isLoading">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                </div>
                <table class="table table-striped table-hover table-sm mb-0" *ngIf="!isLoading">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Role Name</th>
                            <th style="min-width:110px;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let role of filtered() | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize; index as i">
                            <td>{{ (page-1) * pageSize + i + 1 }}</td>
                            <td><strong>{{ role.name }}</strong></td>
                            <td>
                                <button class="btn btn-outline-primary btn-sm" (click)="editRole(role)" title="Edit"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-outline-danger btn-sm ms-1" (click)="deleteRole(role)" title="Delete"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr *ngIf="!isLoading && filtered().length === 0">
                            <td colspan="3" class="text-center text-muted p-3">
                                <i class="fas fa-info-circle me-1"></i> No roles found.
                            </td>
                        </tr>
                    </tbody>
                </table>
                <app-table-paging (pageChangedEvent)="pageChanged($event)"
                    (pageSizeChangedEvent)="pageSizeChanged($event)"
                    [collectionSize]="filtered().length"></app-table-paging>
            </div>
        </div>

    </div>
</section>
