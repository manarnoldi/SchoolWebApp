<app-dashboard-header [title]="dashboardTitle" [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">

<div class="card card-outline card-success mb-2">
    <div class="card-header p-2 d-flex justify-content-between align-items-center">
        <strong><i class="fas fa-user-shield"></i> Roles</strong>
        <button class="btn btn-sm btn-success" (click)="toggleForm()">
            <i class="fas" [ngClass]="showForm ? 'fa-times' : 'fa-plus'"></i>
            {{ showForm ? 'Cancel' : 'Add Role' }}
        </button>
    </div>

    <div class="card-body p-2" *ngIf="showForm">
        <form [formGroup]="roleForm" (ngSubmit)="onSubmit()">
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group mb-1">
                        <label class="form-label">Role Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm" formControlName="name">
                    </div>
                </div>
                <div class="col-md-2 d-flex align-items-end mb-1">
                    <button type="submit" class="btn btn-sm btn-success" [disabled]="roleForm.invalid">
                        <i class="fas fa-save"></i> {{ editMode ? 'Update' : 'Create' }}
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div class="card-body p-0">
        <div class="text-center p-3" *ngIf="isLoading">
            <i class="fas fa-spinner fa-spin"></i> Loading...
        </div>
        <table class="table table-striped table-hover table-sm mb-0" *ngIf="!isLoading">
            <thead class="bg-light">
                <tr>
                    <th>#</th>
                    <th>Role Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let role of roles; index as i">
                    <td>{{ i + 1 }}</td>
                    <td>{{ role.name }}</td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-warning" (click)="editRole(role)" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-danger" (click)="deleteRole(role)" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="roles.length === 0">
                    <td colspan="3" class="text-center text-muted">No roles found</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
