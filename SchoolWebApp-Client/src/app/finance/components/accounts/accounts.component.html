<app-dashboard-header [title]="dashboardTitle" [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<section class="content">
    <div class="container-fluid px-1">

        <!-- Form Modal -->
        <div class="modal-backdrop fade show" *ngIf="showForm" (click)="cancel()"></div>
        <div class="modal fade show d-block" *ngIf="showForm" tabindex="-1">
            <div class="modal-dialog modal-lg" style="margin-top: 50px;">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white py-2">
                        <h5 class="modal-title"><i class="fas fa-book me-1"></i> {{ editMode ? 'Edit' : 'New' }} Account</h5>
                        <button type="button" class="close text-white" (click)="cancel()"><span>&times;</span></button>
                    </div>
                    <div class="modal-body p-2">
                        <div class="border border-info rounded p-2">
                            <div class="row g-1">
                                <div class="col-md-3">
                                    <label class="form-label mb-0" style="font-size:0.8rem;">Code <span class="requiredField">*</span></label>
                                    <input class="form-control form-control-sm" [(ngModel)]="account.code" />
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label mb-0" style="font-size:0.8rem;">Name <span class="requiredField">*</span></label>
                                    <input class="form-control form-control-sm" [(ngModel)]="account.name" />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label mb-0" style="font-size:0.8rem;">Type <span class="requiredField">*</span></label>
                                    <select class="form-select form-select-sm" [(ngModel)]="account.accountType">
                                        <option [ngValue]="t.value" *ngFor="let t of accountTypes">{{ t.label }}</option>
                                    </select>
                                </div>
                                <div class="col-md-1 d-flex align-items-end">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" [(ngModel)]="account.isActive" id="actChk" />
                                        <label class="form-check-label" for="actChk" style="font-size:0.8rem;">Active</label>
                                    </div>
                                </div>
                            </div>
                            <div class="row g-1 mt-1">
                                <div class="col-md-5">
                                    <label class="form-label mb-0" style="font-size:0.8rem;">Parent Account</label>
                                    <select class="form-select form-select-sm" [(ngModel)]="account.parentAccountId">
                                        <option [ngValue]="null">-- None --</option>
                                        <option [ngValue]="a.id" *ngFor="let a of accounts">{{ a.code }} - {{ a.name }}</option>
                                    </select>
                                </div>
                                <div class="col-md-7">
                                    <label class="form-label mb-0" style="font-size:0.8rem;">Description</label>
                                    <input class="form-control form-control-sm" [(ngModel)]="account.description" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer py-1">
                        <button class="btn btn-sm btn-secondary" (click)="cancel()">Cancel</button>
                        <button class="btn btn-sm btn-success" (click)="save()"><i class="fas fa-save"></i> Save</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters + Add button row -->
        <div class="row g-1 mb-1 align-items-end">
            <div class="col-md-3">
                <label class="form-label mb-0" style="font-size:0.8rem;">Account Type</label>
                <select class="form-select form-select-sm" [(ngModel)]="filterType">
                    <option [ngValue]="null">All Types</option>
                    <option [ngValue]="t.value" *ngFor="let t of accountTypes">{{ t.label }}</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label mb-0" style="font-size:0.8rem;">Status</label>
                <select class="form-select form-select-sm" [(ngModel)]="filterActive">
                    <option [ngValue]="null">All</option>
                    <option [ngValue]="true">Active</option>
                    <option [ngValue]="false">Inactive</option>
                </select>
            </div>
            <div class="col-md-1">
                <button class="btn btn-sm btn-outline-secondary" (click)="clearFilters()" title="Clear"><i class="fas fa-times"></i></button>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-sm btn-success" (click)="addNew()"><i class="fas fa-plus"></i> Add Account</button>
            </div>
        </div>

        <!-- List -->
        <div class="card card-outline card-primary">
            <div class="card-header py-1 d-flex justify-content-between align-items-center bg-info text-white">
                <div>
                    <strong><i class="fas fa-book me-1"></i> Chart of Accounts</strong>
                    <span class="badge bg-light text-dark ms-2">{{ filtered().length }}</span>
                </div>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Parent</th>
                            <th>Description</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let a of filtered() | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize">
                            <td><strong>{{ a.code }}</strong></td>
                            <td>{{ a.name }}</td>
                            <td><span class="badge" [ngClass]="getTypeBadgeClass(a.accountType)">{{ getTypeLabel(a.accountType) }}</span></td>
                            <td><small>{{ a.parentAccountName || '-' }}</small></td>
                            <td><small>{{ a.description }}</small></td>
                            <td>
                                <span *ngIf="a.isActive" class="badge bg-success">Active</span>
                                <span *ngIf="!a.isActive" class="badge bg-secondary">Inactive</span>
                            </td>
                            <td>
                                <button class="btn btn-outline-primary btn-sm" (click)="edit(a)"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-outline-danger btn-sm ms-1" (click)="delete(a)"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <app-table-paging (pageChangedEvent)="pageChanged($event)"
                    (pageSizeChangedEvent)="pageSizeChanged($event)"
                    [collectionSize]="filtered().length"></app-table-paging>
            </div>
        </div>
    </div>
</section>
