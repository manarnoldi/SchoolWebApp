<app-dashboard-header
    [title]="dashboardTitle"
    [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<section class="content">
    <div class="container-fluid px-1">
        <div class="row g-1">
            <!-- Left: Category & Entity selector -->
            <div class="col-md-3">
                <div class="card card-outline mb-1" *ngFor="let cat of categories"
                    [class.card-primary]="cat.color === 'primary'"
                    [class.card-warning]="cat.color === 'warning'"
                    [class.card-success]="cat.color === 'success'"
                    [class.card-info]="cat.color === 'info'">
                    <div class="card-header p-1 cursor-pointer align-items-center"
                        style="display:flex !important; justify-content:space-between;"
                        (click)="selectCategory(cat)"
                        [class.bg-primary]="activeCategory === cat && cat.color === 'primary'"
                        [class.bg-success]="activeCategory === cat && cat.color === 'success'"
                        [class.bg-warning]="activeCategory === cat && cat.color === 'warning'"
                        [class.bg-info]="activeCategory === cat && cat.color === 'info'"
                        [class.text-white]="activeCategory === cat">
                        <span><i class="{{cat.icon}} me-1"></i> <strong>{{cat.name}}</strong></span>
                        <i class="fas ms-auto" [class.fa-angle-double-down]="!isCategoryExpanded(cat)"
                            [class.fa-angle-double-up]="isCategoryExpanded(cat)"></i>
                    </div>
                    <div class="list-group list-group-flush" *ngIf="isCategoryExpanded(cat)">
                        <a *ngFor="let cfg of cat.configs"
                            class="list-group-item list-group-item-action py-1 px-2"
                            [class.active]="activeConfig === cfg"
                            (click)="selectConfig(cfg)"
                            style="cursor: pointer; font-size: 0.85rem;">
                            {{cfg.label}}
                        </a>
                        <a *ngFor="let link of cat.links"
                            class="list-group-item list-group-item-action py-1 px-2 text-info"
                            [routerLink]="link.path"
                            style="font-size: 0.85rem;">
                            <i class="{{link.icon}} me-1"></i> {{link.label}}
                            <i class="fas fa-external-link-alt float-end mt-1" style="font-size:0.7rem;"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Right: CRUD Table & Form -->
            <div class="col-md-9">
                <div *ngIf="!activeConfig" class="text-center text-muted p-5">
                    <i class="fas fa-mouse-pointer fa-3x mb-2"></i>
                    <p>Select a dropdown type from the left to manage its items.</p>
                </div>

                <div *ngIf="activeConfig">
                    <!-- Add/Edit Form -->
                    <div class="card card-outline card-success mb-1">
                        <div class="card-header p-1">
                            <strong>{{ editMode ? 'Edit' : 'Add' }} {{ activeConfig.label }}</strong>
                            <button *ngIf="editMode" class="btn btn-sm btn-outline-secondary float-end"
                                (click)="resetForm()">Cancel Edit</button>
                        </div>
                        <div class="card-body p-2">
                            <div class="row">
                                <div *ngFor="let field of activeConfig.fields"
                                    [class]="field.type === 'textarea' ? 'col-md-12' : 'col-md-4'">
                                    <div class="form-group mb-1">
                                        <label class="form-label">{{field.label}}:
                                            <span *ngIf="field.required" class="requiredField">*</span>
                                        </label>
                                        <input *ngIf="field.type === 'text'" type="text"
                                            class="form-control form-control-sm"
                                            [(ngModel)]="formData[field.key]"
                                            [placeholder]="field.label" />
                                        <input *ngIf="field.type === 'number'" type="number"
                                            class="form-control form-control-sm"
                                            [(ngModel)]="formData[field.key]" />
                                        <textarea *ngIf="field.type === 'textarea'"
                                            class="form-control form-control-sm" rows="2"
                                            [(ngModel)]="formData[field.key]"
                                            [placeholder]="field.label"></textarea>
                                        <select *ngIf="field.type === 'select'"
                                            class="form-select form-select-sm"
                                            [(ngModel)]="formData[field.key]">
                                            <option [ngValue]="null" hidden disabled>Select</option>
                                            <option [ngValue]="opt.value" *ngFor="let opt of field.options">{{opt.label}}</option>
                                        </select>
                                        <div *ngIf="field.type === 'boolean'" class="icheck-success mt-1">
                                            <input type="checkbox"
                                                [id]="'fld_' + field.key"
                                                [checked]="formData[field.key] === true"
                                                (change)="formData[field.key] = !formData[field.key]" />
                                            <label [for]="'fld_' + field.key">
                                                {{ formData[field.key] === true ? 'Yes' : 'No' }}
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="text-end mt-1">
                                <button class="btn btn-success btn-sm" (click)="saveItem()">
                                    <i class="fas fa-save"></i> {{ editMode ? 'Update' : 'Save' }}
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Items Table -->
                    <div class="card">
                        <div class="card-header bg-info text-white p-1">
                            <strong>{{ activeConfig.label }} - {{ items.length }} items</strong>
                        </div>
                        <div class="card-body table-responsive p-0">
                            <table class="table table-striped table-hover table-sm mb-0">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th *ngFor="let field of activeConfig.fields">{{field.label}}</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let item of items | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize; index as i">
                                        <td>{{ (page-1) * pageSize + i + 1 }}</td>
                                        <td *ngFor="let field of activeConfig.fields">{{ item[field.key] }}</td>
                                        <td>
                                            <div class="btn-group btn-group-sm">
                                                <button class="btn btn-outline-primary" (click)="startEdit(item)" title="Edit">
                                                    <i class="fas fa-edit"></i>
                                                </button>
                                                <button class="btn btn-outline-danger" (click)="deleteItem(item)" title="Delete">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <app-table-paging (pageChangedEvent)="pageChanged($event)"
                                (pageSizeChangedEvent)="pageSizeChanged($event)"
                                [collectionSize]="items.length"></app-table-paging>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
