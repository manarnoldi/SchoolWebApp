<app-dashboard-header
    [title]="dashboardTitle"
    [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<section class="content">
    <div class="container-fluid px-1">
        <div class="card card-outline mb-1" *ngFor="let module of modules"
            [class.card-primary]="module.color === 'primary'"
            [class.card-success]="module.color === 'success'"
            [class.card-warning]="module.color === 'warning'"
            [class.card-info]="module.color === 'info'"
            [class.card-danger]="module.color === 'danger'">
            <div class="card-header p-1 cursor-pointer text-white align-items-center"
                style="display:flex !important; justify-content:space-between;"
                (click)="toggleModule(module)"
                [class.bg-primary]="module.color === 'primary'"
                [class.bg-success]="module.color === 'success'"
                [class.bg-warning]="module.color === 'warning'"
                [class.bg-info]="module.color === 'info'"
                [class.bg-danger]="module.color === 'danger'">
                <span><i class="{{module.icon}} me-1"></i> <strong>{{ module.title }}</strong></span>
                <span>
                    <button class="btn btn-light btn-sm me-2"
                        (click)="$event.stopPropagation(); saveAll()" [disabled]="isSaving">
                        <i class="fas fa-save"></i> {{ isSaving ? 'Saving...' : 'Save' }}
                    </button>
                    <i class="fas ms-1"
                        [class.fa-angle-double-down]="!isModuleExpanded(module)"
                        [class.fa-angle-double-up]="isModuleExpanded(module)"></i>
                </span>
            </div>
            <div class="card-body p-0" *ngIf="isModuleExpanded(module)">
                <table class="table table-striped table-hover table-sm mb-0">
                    <thead>
                        <tr class="table-light">
                            <th style="width:30%;">Setting</th>
                            <th style="width:35%;">Description</th>
                            <th style="width:35%;">Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let setting of module.settings">
                            <td class="fw-bold align-middle">{{ setting.label }}</td>
                            <td class="text-muted align-middle" style="font-size:0.85rem;">{{ setting.description }}</td>
                            <td class="align-middle">
                                <select *ngIf="setting.type === 'select'"
                                    class="form-select form-select-sm"
                                    [ngModel]="getValue(module.name, setting.key)"
                                    (ngModelChange)="setValue(module.name, setting.key, $event)">
                                    <option [value]="opt.value" *ngFor="let opt of setting.options">{{ opt.label }}</option>
                                </select>
                                <div *ngIf="setting.type === 'boolean'" class="icheck-success">
                                    <input type="checkbox" [id]="'gs_' + module.name + '_' + setting.key"
                                        [checked]="getValue(module.name, setting.key) === 'true'"
                                        (change)="toggleBoolean(module.name, setting.key)" />
                                    <label [for]="'gs_' + module.name + '_' + setting.key">
                                        {{ getValue(module.name, setting.key) === 'true' ? 'Enabled' : 'Disabled' }}
                                    </label>
                                </div>
                                <input *ngIf="setting.type === 'text'"
                                    type="text" class="form-control form-control-sm"
                                    [ngModel]="getValue(module.name, setting.key)"
                                    (ngModelChange)="setValue(module.name, setting.key, $event)" />
                                <select *ngIf="setting.type === 'account'"
                                    class="form-select form-select-sm"
                                    [ngModel]="getValue(module.name, setting.key)"
                                    (ngModelChange)="setValue(module.name, setting.key, $event)">
                                    <option value="">-- Select Account --</option>
                                    <option [value]="a.id" *ngFor="let a of accounts">{{ a.code }} - {{ a.name }} ({{ a.accountTypeName }})</option>
                                </select>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
