<app-dashboard-header
    [title]="dashboardTitle"
    [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<section class="content">
    <div class="container-fluid px-1">
        <div class="card card-outline card-info mb-1">
            <div class="card-body p-1">
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group mb-1">
                            <label class="form-label">Curriculum: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterCurriculumId" (change)="onCurriculumChange()">
                                <option [ngValue]="null" hidden disabled selected>Select curriculum</option>
                                <option [ngValue]="c.id" *ngFor="let c of curricula">{{c.name}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-1">
                            <label class="form-label">Year: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterAcademicYearId" (change)="onAcademicYearChange()">
                                <option [ngValue]="null" hidden disabled selected>Select year</option>
                                <option [ngValue]="y.id" *ngFor="let y of academicYears">{{y.name}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-1">
                            <label class="form-label">Class: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterSchoolClassId" (ngModelChange)="onSchoolClassPicked()">
                                <option [ngValue]="null" hidden disabled selected>Select class</option>
                                <option [ngValue]="sc.id" *ngFor="let sc of schoolClasses">{{sc.name}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group mb-1">
                            <label class="form-label">Activity: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterActivityId" (ngModelChange)="onActivityPicked()">
                                <option [ngValue]="null" hidden disabled selected>Select activity</option>
                                <option [ngValue]="act.id" *ngFor="let act of activities">{{act.name}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-1 d-flex align-items-end mb-1">
                        <button class="btn btn-sm btn-info" (click)="loadBatchScores()">
                            <i class="fas fa-users"></i> Load
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" *ngIf="batchLoaded">
            <div class="card-header bg-primary text-white p-1 d-flex justify-content-between align-items-center gap-2">
                <strong>{{ getSelectedActivityName() }} - Student Scores</strong>
                <input type="text" class="form-control form-control-sm" placeholder="Search by admno or name..."
                    style="max-width: 250px;" [(ngModel)]="searchText" (ngModelChange)="onSearchChanged()">
                <span>{{ filteredBatchRows.length }} of {{ batchRows.length }} student(s)</span>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover table-sm mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student</th>
                            <th *ngFor="let st of scoreTypes">{{st.name}}</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let row of filteredBatchRows | slice: (tablePage-1)*tablePageSize : tablePage*tablePageSize; index as i"
                            [class.table-success]="hasAnyExisting(row)">
                            <td>{{ (tablePage-1)*tablePageSize + i + 1 }}</td>
                            <td>{{ row.studentName }}</td>
                            <td *ngFor="let st of scoreTypes">
                                <div class="d-flex gap-1">
                                    <select class="form-select form-select-sm" style="flex: 1;"
                                        [(ngModel)]="row.scoresByType[st.id].scoreId">
                                        <option [ngValue]="null">-Select-</option>
                                        <option [ngValue]="score.id" *ngFor="let score of getScoresForType(st.id)">
                                            {{score.name}} ({{score.abbreviation}})
                                        </option>
                                    </select>
                                    <input type="text" class="form-control form-control-sm" style="flex: 1;"
                                        [(ngModel)]="row.scoresByType[st.id].description"
                                        placeholder="Remarks" />
                                </div>
                            </td>
                            <td>
                                <button *ngIf="hasAnyExisting(row)" class="btn btn-danger btn-sm"
                                    (click)="deleteStudentScores(row)" title="Delete all scores for this student">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <app-table-paging [collectionSize]="filteredBatchRows.length" [pageSize]="tablePageSize"
                    (pageChangedEvent)="onTablePageChanged($event)"
                    (pageSizeChangedEvent)="onTablePageSizeChanged($event)"></app-table-paging>
            </div>
            <div class="card-footer p-1 d-flex justify-content-between">
                <button class="btn btn-danger btn-sm" (click)="deleteAll()"
                    [disabled]="isSaving || getExistingCount() === 0">
                    <i class="fas fa-trash"></i> Delete All ({{getExistingCount()}})
                </button>
                <button class="btn btn-success btn-sm" (click)="saveAll()" [disabled]="isSaving">
                    <i class="fas fa-save"></i>
                    {{ isSaving ? 'Saving...' : 'Save All Scores' }}
                </button>
            </div>
        </div>
    </div>
</section>
