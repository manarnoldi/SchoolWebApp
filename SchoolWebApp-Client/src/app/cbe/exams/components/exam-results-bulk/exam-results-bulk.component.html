<app-dashboard-header
    [title]="dashboardTitle"
    [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<section class="content">
    <div class="container-fluid px-1">
        <div class="card card-outline card-info mb-1">
            <div class="card-body p-1">
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group mb-1">
                            <label class="form-label">Curriculum: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterCurriculumId" (change)="onCurriculumChange()">
                                <option [ngValue]="null" hidden disabled selected>Select curriculum</option>
                                <option [ngValue]="c.id" *ngFor="let c of curricula">{{c.name}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-1">
                            <label class="form-label">Year: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterAcademicYearId" (change)="onAcademicYearChange()">
                                <option [ngValue]="null" hidden disabled selected>Select year</option>
                                <option [ngValue]="y.id" *ngFor="let y of academicYears">{{y.name}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-1">
                            <label class="form-label">Session: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterSessionId" (change)="onSessionChange()">
                                <option [ngValue]="null" hidden disabled selected>Select session</option>
                                <option [ngValue]="s.id" *ngFor="let s of sessions">{{s.sessionName}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-1">
                            <label class="form-label">Class: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterSchoolClassId">
                                <option [ngValue]="null" hidden disabled selected>Select class</option>
                                <option [ngValue]="sc.id" *ngFor="let sc of schoolClasses">{{sc.name}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-1">
                            <label class="form-label">School Exam: <span class="requiredField">*</span></label>
                            <select class="form-select form-select-sm"
                                [(ngModel)]="filterSchoolExamId" (change)="onSchoolExamChange()"
                                [disabled]="!filterSessionId">
                                <option [ngValue]="null" hidden disabled selected>
                                    {{ filterSessionId ? 'Select school exam' : 'Select a session first' }}
                                </option>
                                <option [ngValue]="se.id" *ngFor="let se of schoolExams">
                                    {{ se.examType?.name }} ({{ se.examStartDate | date:'mediumDate' }})
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2 d-flex align-items-end mb-1">
                        <button class="btn btn-sm btn-info" (click)="loadGrid()" [disabled]="isLoading">
                            <i class="fas fa-th"></i> {{ isLoading ? 'Loading...' : 'Load Grid' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" *ngIf="loaded">
            <div class="card-header bg-primary text-white p-1">
                <strong>Bulk Results Entry</strong>
                <span class="float-end">{{ studentRows.length }} students | {{ subjects.length }} subjects | {{ getScoredCount() }} scored</span>
            </div>
            <div class="card-body table-responsive p-0">
                <table class="table table-striped table-hover table-sm table-bordered mb-0">
                    <thead>
                        <tr class="table-dark">
                            <th>#</th>
                            <th class="text-nowrap">Student</th>
                            <th *ngFor="let subj of subjects" class="text-center">
                                {{subj.abbr}}<br><small>({{subj.examMark}})</small>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let row of studentRows | slice: (tablePage-1)*tablePageSize : tablePage*tablePageSize; index as i">
                            <td>{{ (tablePage-1)*tablePageSize + i + 1 }}</td>
                            <td class="text-nowrap">{{ row.studentName }}</td>
                            <td *ngFor="let subj of subjects" class="p-0"
                                [ngClass]="{'bg-secondary-subtle': row.scores[subj.examId].disabled}">
                                <div *ngIf="!row.scores[subj.examId].disabled" class="d-flex align-items-center">
                                    <input type="number" class="form-control form-control-sm border-0 text-center flex-grow-1"
                                        [(ngModel)]="row.scores[subj.examId].score"
                                        [max]="subj.examMark" min="0" step="0.5"
                                        (change)="validateScore(row, subj)"
                                        placeholder="-"
                                        [ngClass]="{'bg-success-subtle': row.scores[subj.examId].existingId}" />
                                    <i *ngIf="row.scores[subj.examId].existingId"
                                        class="fas fa-times text-danger me-1" style="cursor:pointer; font-size:0.65rem;"
                                        title="Delete this result"
                                        (click)="deleteCell(row, subj.examId)"></i>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <app-table-paging [collectionSize]="studentRows.length" [pageSize]="tablePageSize"
                    (pageChangedEvent)="tablePage = $event"
                    (pageSizeChangedEvent)="tablePageSize = $event"></app-table-paging>
            </div>
            <div class="card-footer p-1 d-flex justify-content-between align-items-center">
                <button class="btn btn-danger btn-sm" (click)="deleteAllResults()" [disabled]="isDeleting || getSavedCount() === 0">
                    <i class="fas fa-trash"></i>
                    {{ isDeleting ? 'Deleting...' : 'Delete All Results (' + getSavedCount() + ')' }}
                </button>
                <button class="btn btn-success btn-sm" (click)="saveAll()" [disabled]="isSaving">
                    <i class="fas fa-save"></i>
                    {{ isSaving ? 'Saving...' : 'Save All Results' }}
                </button>
            </div>
        </div>
    </div>
</section>
