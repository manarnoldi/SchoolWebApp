<app-dashboard-header
    [title]="dashboardTitle"
    [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<div
    class="modal fade"
    id="{{tableModel}}FormModal"
    tabindex="-1"
    attr.aria-labelledby="ExamTypeModalLabel"
    aria-hidden="true"
    data-bs-backdrop="static"
    data-bs-keyboard="false">
    <div class="modal-dialog modal-md">
        <div class="modal-content">
            <div class="modal-header bg-success opacity-50 p-2">
                <h5 class="modal-title" id="ExamTypeFormModalLabel">
                    Exam type details
                </h5>
                <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close"
                    #closebutton (click)="resetForm()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form [formGroup]="examTypeForm" (ngSubmit)="onSubmit()" novalidate>
                <div class="modal-body p-1">
                    <div class="card-details-box border-info mb-1">
                        <div class="row">
                            <div class="col-md-8">
                                <div class="form-group">
                                    <label for="name">Name: <span class="requiredField">*</span></label>
                                    <input id="name" placeholder="Exam type name" type="text"
                                        class="form-control form-control-sm" formControlName="name"
                                        [ngClass]="{'is-invalid': (f.name.dirty || f.name.touched) && f.name.invalid}" />
                                    <div class="invalid-feedback">Name is required</div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="abbreviation">Abbreviation: <span class="requiredField">*</span></label>
                                    <input id="abbreviation" placeholder="Abbreviation" type="text"
                                        class="form-control form-control-sm" formControlName="abbreviation"
                                        [ngClass]="{'is-invalid': (f.abbreviation.dirty || f.abbreviation.touched) && f.abbreviation.invalid}" />
                                    <div class="invalid-feedback">Abbreviation is required</div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="rank">Rank: <span class="requiredField">*</span></label>
                                    <input id="rank" placeholder="Rank" type="number"
                                        class="form-control form-control-sm" formControlName="rank"
                                        [ngClass]="{'is-invalid': (f.rank.dirty || f.rank.touched) && f.rank.invalid}" />
                                    <div class="invalid-feedback">Rank is required</div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <div class="icheck-success">
                                        <input type="checkbox" id="internal" formControlName="internal" />
                                        <label for="internal">Internal</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label for="description">Description</label>
                                    <textarea placeholder="Description" id="description"
                                        class="form-control form-control-sm" rows="2"
                                        formControlName="description"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer p-1">
                        <button type="submit" [disabled]="examTypeForm.invalid" class="btn btn-success">
                            <i class="fas fa-save"></i> {{ editMode ? 'Update' : 'Save' }}
                        </button>
                        <button type="button" class="btn btn-warning" data-bs-dismiss="modal"
                            (click)="resetForm()">
                            <i class="fas fa-times"></i> Close
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<section class="content">
    <div class="container-fluid px-1">
        <div class="row g-0">
            <div class="col-12">
                <app-table-button modelName="{{tableModel}}" buttonTitle="{{buttonTitle}}"></app-table-button>
            </div>
        </div>
        <div class="card">
            <app-table-heading tableTitle="{{tableTitle}} - {{examTypes.length}} items"></app-table-heading>
            <div class="card-body table-responsive p-0">
                <table class="table table-striped table-hover text-nowrap">
                    <thead>
                        <tr>
                            <th *ngFor="let header of tableHeaders">{{ header }}</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let item of examTypes | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize">
                            <td>{{ item.id }}</td>
                            <td>{{ item.name }}</td>
                            <td>{{ item.abbreviation }}</td>
                            <td>{{ item.internal ? 'Yes' : 'No' }}</td>
                            <td>{{ item.rank }}</td>
                            <td>{{ item.description }}</td>
                            <app-table-action
                                (editItemEvent)="editItem(item.id)"
                                (deleteItemEvent)="deleteItem(item)"></app-table-action>
                        </tr>
                    </tbody>
                </table>
                <app-table-paging (pageChangedEvent)="pageChanged($event)"
                    (pageSizeChangedEvent)="pageSizeChanged($event)"
                    [collectionSize]="examTypes.length"></app-table-paging>
            </div>
        </div>
    </div>
</section>
