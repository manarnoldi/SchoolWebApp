<app-dashboard-header [title]="dashboardTitle" [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<section class="content">
    <div class="container-fluid px-1">
        <!-- Filters -->
        <div class="card card-outline card-primary mb-1">
            <div class="card-header py-1">
                <strong><i class="fas fa-filter mr-1"></i> Select Class</strong>
            </div>
            <div class="card-body p-1">
                <div class="row g-1">
                    <div class="col-md-4">
                        <label class="form-label mb-0" style="font-size: 0.8rem;">Academic Year <span class="requiredField">*</span></label>
                        <select class="form-select form-select-sm"
                            [(ngModel)]="selectedAcademicYearId"
                            (change)="onAcademicYearChange()">
                            <option [ngValue]="null" hidden disabled>Select academic year</option>
                            <option [ngValue]="y.id" *ngFor="let y of academicYears">{{ y.name }}</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label mb-0" style="font-size: 0.8rem;">Class <span class="requiredField">*</span></label>
                        <select class="form-select form-select-sm"
                            [(ngModel)]="selectedSchoolClassId"
                            (change)="onSchoolClassChange()">
                            <option [ngValue]="null" hidden disabled>Select class</option>
                            <option [ngValue]="c.id" *ngFor="let c of schoolClasses">
                                {{ c.name || (c.learningLevel?.name + (c.schoolStream?.name ? ' - ' + c.schoolStream.name : '')) }}
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <span class="badge bg-info" *ngIf="allocationRows.length > 0">
                            {{ allocationRows.length }} subject(s)
                        </span>
                        <span class="badge bg-warning ml-1" *ngIf="hasChanges()">
                            {{ getChangedCount() }} unsaved change(s)
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div class="text-center py-3" *ngIf="isLoading">
            <i class="fas fa-spinner fa-spin text-primary"></i>
            <span class="text-muted ml-1">Loading subjects and allocations...</span>
        </div>

        <!-- No data -->
        <div class="text-center py-3 text-muted" *ngIf="hasLoaded && !isLoading && allocationRows.length === 0">
            <i class="fas fa-info-circle mr-1"></i> No subjects found for the selected class.
        </div>

        <!-- Allocation table -->
        <div class="card card-outline card-success mb-1" *ngIf="!isLoading && allocationRows.length > 0">
            <div class="card-header py-1 d-flex justify-content-between align-items-center">
                <strong><i class="fas fa-chalkboard-teacher mr-1"></i> Subject-Staff Allocation</strong>
                <button class="btn btn-success btn-sm" (click)="saveAllocations()"
                    [disabled]="!hasChanges() || isSaving">
                    <i class="fas" [ngClass]="isSaving ? 'fa-spinner fa-spin' : 'fa-save'"></i>
                    {{ isSaving ? 'Saving...' : 'Save All Changes' }}
                </button>
            </div>
            <div class="card-body p-0">
                <table class="table table-sm table-striped table-hover mb-0">
                    <thead>
                        <tr class="table-light">
                            <th style="width: 5%;">#</th>
                            <th style="width: 30%;">Subject</th>
                            <th style="width: 45%;">Assigned Teacher</th>
                            <th style="width: 20%;" class="text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let row of allocationRows; index as i"
                            [ngClass]="{'table-warning': row.changed}">
                            <td class="align-middle">{{ i + 1 }}</td>
                            <td class="align-middle fw-bold">{{ row.subjectName }}</td>
                            <td class="align-middle">
                                <select class="form-select form-select-sm"
                                    [(ngModel)]="row.staffDetailsId"
                                    (ngModelChange)="onStaffChange(row)">
                                    <option [ngValue]="null">-- Not Assigned --</option>
                                    <option [ngValue]="staff.id" *ngFor="let staff of teachingStaff">
                                        {{ staff.fullName }}
                                    </option>
                                </select>
                            </td>
                            <td class="text-center align-middle">
                                <span *ngIf="row.existingId && !row.changed" class="badge bg-success">
                                    <i class="fas fa-check"></i> Allocated
                                </span>
                                <span *ngIf="!row.existingId && !row.staffDetailsId && !row.changed" class="badge bg-secondary">
                                    <i class="fas fa-minus"></i> Unassigned
                                </span>
                                <span *ngIf="row.changed" class="badge bg-warning text-dark">
                                    <i class="fas fa-pen"></i> Modified
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
