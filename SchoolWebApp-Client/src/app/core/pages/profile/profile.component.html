<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>My Profile</h1>
            </div>
            <div class="col-sm-6">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
                    <li class="breadcrumb-item active">Profile</li>
                </ol>
            </div>
        </div>
    </div>
</section>

<section class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-4">
                <div class="card card-primary card-outline">
                    <div class="card-body box-profile">
                        <div class="text-center">
                            <pf-image
                                src="/assets/img/default-profile.png"
                                alt="User profile picture"
                                width="100"
                                height="100"
                                rounded="true"></pf-image>
                        </div>
                        <h3 class="profile-username text-center">
                            {{ user.firstName }} {{ user.lastName }}
                        </h3>
                        <p class="text-muted text-center">{{ user.userName }}</p>

                        <ul class="list-group list-group-unbordered mb-3">
                            <li class="list-group-item">
                                <b>Email</b>
                                <span class="float-right">{{ user.email }}</span>
                            </li>
                            <li class="list-group-item">
                                <b>Roles</b>
                                <span class="float-right">
                                    <span class="badge bg-info me-1" *ngFor="let r of user.roles">{{ r }}</span>
                                </span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card card-outline card-warning">
                    <div class="card-header p-2">
                        <strong><i class="fas fa-key"></i> Change Password</strong>
                    </div>
                    <div class="card-body">
                        <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-2">
                                        <label class="form-label">Current Password <span class="text-danger">*</span></label>
                                        <input type="password" class="form-control form-control-sm"
                                            formControlName="currentPassword"
                                            [ngClass]="{'is-invalid': f['currentPassword'].touched && f['currentPassword'].errors}">
                                        <div class="invalid-feedback" *ngIf="f['currentPassword'].touched && f['currentPassword'].errors?.['required']">
                                            Current password is required
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-2">
                                        <label class="form-label">New Password <span class="text-danger">*</span></label>
                                        <input type="password" class="form-control form-control-sm"
                                            formControlName="newPassword"
                                            [ngClass]="{'is-invalid': f['newPassword'].touched && f['newPassword'].errors}">
                                        <div class="invalid-feedback" *ngIf="f['newPassword'].touched && f['newPassword'].errors?.['required']">
                                            New password is required
                                        </div>
                                        <div class="invalid-feedback" *ngIf="f['newPassword'].touched && f['newPassword'].errors?.['minlength']">
                                            Minimum 6 characters
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-2">
                                        <label class="form-label">Confirm New Password <span class="text-danger">*</span></label>
                                        <input type="password" class="form-control form-control-sm"
                                            formControlName="confirmPassword"
                                            [ngClass]="{'is-invalid': f['confirmPassword'].touched && !passwordsMatch}">
                                        <div class="invalid-feedback" *ngIf="f['confirmPassword'].touched && !passwordsMatch">
                                            Passwords do not match
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-sm btn-warning"
                                [disabled]="passwordForm.invalid || !passwordsMatch || isSaving">
                                <i class="fas" [ngClass]="isSaving ? 'fa-spinner fa-spin' : 'fa-key'"></i>
                                {{ isSaving ? 'Changing...' : 'Change Password' }}
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
