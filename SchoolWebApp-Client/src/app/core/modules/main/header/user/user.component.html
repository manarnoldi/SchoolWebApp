<div class="user-menu dropdown">
    <a class="nav-link" role="button" id="userDropdownBtn"
        data-bs-toggle="dropdown" aria-expanded="false">
        <i class="fas fa-user-circle"
            style="font-size: 1.5rem; color: var(--dbta-primary, #3674B3);"></i>
    </a>
    <ul class="dropdown-menu dropdown-menu-end p-0" aria-labelledby="userDropdownBtn" style="min-width: 280px;">
        <li>
            <a class="dropdown-item user-header bg-primary text-white py-3 px-3"
                style="cursor:pointer; text-decoration:none; white-space: normal;"
                routerLink="/profile">
                <div class="d-flex align-items-center gap-2">
                    <i class="fas fa-user-circle" style="font-size: 2rem;"></i>
                    <div>
                        <div class="fw-semibold" style="font-size: 0.9rem;">{{ user?.firstName }} {{ user?.lastName }}</div>
                        <small style="font-size: 0.75rem; opacity: 0.85;">{{ user?.email }}</small>
                    </div>
                </div>
            </a>
        </li>
        <li *ngIf="user?.roles?.length > 0">
            <div class="px-3 py-2 border-top text-center">
                <span class="badge bg-info me-1" *ngFor="let role of user?.roles">{{ role }}</span>
            </div>
        </li>
        <li>
            <div class="d-flex justify-content-between px-2 py-2 border-top"
                style="font-size:0.78rem">
                <a [routerLink]="['/change-password']" class="btn btn-default btn-flat btn-sm">
                    <i class="fas fa-key me-1"></i>Change Password
                </a>
                <a (click)="logout()" class="btn btn-flat btn-sm"
                    style="color:#dc3545; cursor:pointer">
                    <i class="fas fa-sign-out-alt me-1"></i>Sign out
                </a>
            </div>
        </li>
    </ul>
</div>
