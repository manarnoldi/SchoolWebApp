<pf-dropdown [hideArrow]="true">
    <div slot="button">
        <a class="nav-link">
            <i class="far fa-bell"></i>
            <span class="badge badge-warning navbar-badge" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
        </a>
    </div>
    <div slot="menu">
        <span class="dropdown-item dropdown-header" *ngIf="notificationCount > 0">
            {{ notificationCount }} pending approval{{ notificationCount !== 1 ? 's' : '' }}
        </span>
        <span class="dropdown-item dropdown-header" *ngIf="notificationCount === 0">No pending approvals</span>

        <ng-container *ngIf="pendingApprovals.length > 0">
            <div class="dropdown-divider"></div>
            <a *ngFor="let item of pendingApprovals" class="dropdown-item" (click)="openTask(item)" role="button" style="white-space: normal;">
                <i [ngClass]="iconFor(item.entityType)" class="mr-2"></i>
                <strong>{{ formKeyLabel(item.entityType) }}</strong>
                <small class="text-muted"> &mdash; Step {{ item.currentStepRank }}: {{ item.stepName }}</small>
                <div class="text-sm text-muted">
                    From <strong>{{ item.submittedByName }}</strong>
                    <span class="float-right">{{ getTimeAgo(item.submittedAt) }}</span>
                </div>
            </a>
        </ng-container>

        <div class="dropdown-divider" *ngIf="pendingApprovals.length > 0"></div>
        <a class="dropdown-item dropdown-footer" (click)="loadNotifications()" role="button">
            <i class="fas fa-sync-alt me-1"></i> Refresh
        </a>
    </div>
</pf-dropdown>
