<div class="login-box">
    <div class="login-card">
        <div class="login-brand">
            <img src="assets/img/shule-nova-logo.png" alt="ShuleNova Logo" class="logo">
            <p class="login-subtitle">School Management System</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="loginByAuth()">
            <div class="form-group mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <div class="input-group-text"><i class="fas fa-user"></i></div>
                    </div>
                    <input formControlName="username" type="text" class="form-control"
                        id="username" placeholder="Enter your username"
                        [ngClass]="{'is-invalid': loginForm.get('username').touched && loginForm.get('username').invalid}" />
                </div>
                <small class="text-danger" *ngIf="loginForm.get('username').touched && loginForm.get('username').invalid">
                    Username is required
                </small>
            </div>

            <div class="form-group mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <div class="input-group-text"><i class="fas fa-lock"></i></div>
                    </div>
                    <input formControlName="password" [type]="showPassword ? 'text' : 'password'"
                        class="form-control" id="password" placeholder="Enter your password"
                        [ngClass]="{'is-invalid': loginForm.get('password').touched && loginForm.get('password').invalid}" />
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" (click)="showPassword = !showPassword" tabindex="-1">
                            <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>
                <small class="text-danger" *ngIf="loginForm.get('password').touched && loginForm.get('password').invalid">
                    Password is required
                </small>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap options">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe" />
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a [routerLink]="['/forgot-password']"
                    class="text-decoration-none forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-gradient w-100 py-2" [disabled]="isAuthLoading">
                <span *ngIf="!isAuthLoading"><i class="fas fa-sign-in-alt mr-1"></i> Sign In</span>
                <span *ngIf="isAuthLoading"><i class="fas fa-spinner fa-spin mr-1"></i> Signing in...</span>
            </button>
        </form>

        <div class="login-footer">
            <small class="text-muted">&copy; {{ currentYear }} ShuleNova. All rights reserved.</small>
        </div>
    </div>
</div>
