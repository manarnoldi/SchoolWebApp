<div class="login-box">
    <div class="login-card">
        <div class="login-brand">
            <img src="assets/img/shule-nova-logo.png" alt="ShuleNova Logo" class="logo">
            <p class="login-subtitle">Change Password</p>
        </div>

        <div class="alert alert-warning py-2 mb-3" *ngIf="mustChange" style="font-size:0.85rem;">
            <i class="fas fa-exclamation-triangle me-1"></i>
            Your account requires a password change before you can continue.
        </div>

        <form [formGroup]="changePasswordForm" (ngSubmit)="submit()" novalidate>
            <div class="form-group mb-2" *ngIf="userName">
                <small class="text-muted">Signed in as <strong>{{ userName }}</strong></small>
            </div>

            <div class="form-group mb-3">
                <label for="currentPassword" class="form-label">Current Password</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <div class="input-group-text"><i class="fas fa-lock"></i></div>
                    </div>
                    <input formControlName="currentPassword" [type]="showCurrent ? 'text' : 'password'"
                        class="form-control" id="currentPassword" placeholder="Enter your current password"
                        [ngClass]="{'is-invalid': changePasswordForm.get('currentPassword').touched && changePasswordForm.get('currentPassword').invalid}" />
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" (click)="showCurrent = !showCurrent" tabindex="-1">
                            <i class="fas" [ngClass]="showCurrent ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>
                <small class="text-danger" *ngIf="changePasswordForm.get('currentPassword').touched && changePasswordForm.get('currentPassword').invalid">
                    Current password is required
                </small>
            </div>

            <div class="form-group mb-3">
                <label for="newPassword" class="form-label">New Password</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <div class="input-group-text"><i class="fas fa-key"></i></div>
                    </div>
                    <input formControlName="newPassword" [type]="showNew ? 'text' : 'password'"
                        class="form-control" id="newPassword" placeholder="At least 6 characters"
                        [ngClass]="{'is-invalid': changePasswordForm.get('newPassword').touched && changePasswordForm.get('newPassword').invalid}" />
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" (click)="showNew = !showNew" tabindex="-1">
                            <i class="fas" [ngClass]="showNew ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>
                <small class="text-danger" *ngIf="changePasswordForm.get('newPassword').touched && changePasswordForm.get('newPassword').invalid">
                    New password must be at least 6 characters
                </small>
            </div>

            <div class="form-group mb-3">
                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <div class="input-group-text"><i class="fas fa-check"></i></div>
                    </div>
                    <input formControlName="confirmPassword" [type]="showConfirm ? 'text' : 'password'"
                        class="form-control" id="confirmPassword" placeholder="Re-enter the new password"
                        [ngClass]="{'is-invalid': (changePasswordForm.get('confirmPassword').touched && changePasswordForm.get('confirmPassword').invalid) || (changePasswordForm.errors?.mismatch && changePasswordForm.get('confirmPassword').touched)}" />
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" (click)="showConfirm = !showConfirm" tabindex="-1">
                            <i class="fas" [ngClass]="showConfirm ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>
                <small class="text-danger" *ngIf="changePasswordForm.errors?.mismatch && changePasswordForm.get('confirmPassword').touched">
                    Passwords do not match
                </small>
            </div>

            <button type="submit" class="btn btn-gradient w-100 py-2" [disabled]="isSaving">
                <span *ngIf="!isSaving"><i class="fas fa-save me-1"></i> Change Password</span>
                <span *ngIf="isSaving"><i class="fas fa-spinner fa-spin me-1"></i> Saving...</span>
            </button>
        </form>

        <p class="mt-3 mb-1 text-center">
            <a href="javascript:void(0)" (click)="signOut()" class="text-decoration-none">Sign out</a>
        </p>

        <div class="login-footer">
            <small class="text-muted">&copy; ShuleNova. All rights reserved.</small>
        </div>
    </div>
</div>
