<div class="card my-1">
    <div class="row g-0">
        <div class="col-11">
            <app-school-soft-filter-form
                [curricula]="curricula" [educationLevels]="educationLevels"
                [academicYears]="academicYears" [schoolClasses]="schoolClasses"
                [showCurriculum]="true" [showAcademicYear]="true"
                [showEducationLevel]="true" [showSchoolClass]="true"
                (curriculumChangedEvent)="curriculumChanged($event)"
                (academicYearChangedEvent)="academicYearChanged($event)"
                (educationLevelChangedEvent)="educationLevelChanged($event)"
                (schoolClassChangedEvent)="schoolClassChanged($event)"
                (searchItemEvent)="searchForDataMethod($event)"></app-school-soft-filter-form>
        </div>
        <div class="col-1">
            <button type="button" class="btn btn-sm btn-flat btn-danger btn-block float-right m-1"
                [disabled]="selectedCount <= 0"
                (click)="printReport()">
                <i class="fas fa-print"></i>
                {{ selectedCount === 1? 'Preview':'Print' }}
            </button>
        </div>
    </div>
</div>
<div class="row g-0">
    <div class="col-4">
        <app-student-class-min-table [studentClasses]="studentClasses"
            [showCheckBoxes]="true" [showStatus]="false" [showMinimum]="true"
            [subjectCounts]="subjectCounts" [selectedId]="selectedStudentClassId"
            (studentClassClickedEvent)="studentClassClicked($event)"></app-student-class-min-table>
    </div>
    <div class="col-8">
        <app-student-subject-table [academicYears]="academicYears"
            [studentSubjects]="studentSubjects"
            *ngIf="studentSubjects" [showEditDeleteControls]="false"></app-student-subject-table>
    </div>
</div>
