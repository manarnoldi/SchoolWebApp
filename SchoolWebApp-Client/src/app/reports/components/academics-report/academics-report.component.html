<app-dashboard-header
    [title]="dashboardTitle"
    [breadcrumbs]="breadcrumbs"></app-dashboard-header>
<hr class="mb-1">
<a *ngIf="querySource==='dashboard'" class="btn btn-flat btn-sm btn-info mb-1" [routerLink]="['/']"><i class="fas fa-angle-double-left"></i> Dashboard</a>
<section class="content">
    <div class="container-fluid px-1">
        <div class="row g-0 card-details-box border-primary mt-1">
            <div class="col-md-8">
                <app-reports-loader [reportTitle]="'academics'" [showSubreport]="showSubReport"
                    (reportNameChangedEvent)="reportNameChanged($event)"
                    (subReportNameChangedEvent)="subReportNameChanged($event)"
                    (searchItemEvent)="searchItem($event)"></app-reports-loader>
            </div>
        </div>
        <div class="row g-0 card-details-box border-danger mt-1 p-1"
            *ngIf="currentReport?.code === 'ACADEMICS001'">
            <div class="col-md-12">
                <app-missing-marks-report></app-missing-marks-report>
            </div>
        </div>
        <div class="row g-0 card-details-box border-danger mt-1 p-1"
            *ngIf="currentReport?.subReport?.code === 'ACADSUB100'">
            <div class="col-md-12">
                <app-broadsheet></app-broadsheet>
            </div>
        </div>
    </div>
</section>
